# TEIF Production Docker Compose Stack
# Optimized for Coolify with Zero-Downtime Deployments
# Usage: docker compose -f docker-compose.prod.yml up -d
# 
# This is a single atomic stack deployment:
# - All services start together with proper dependencies
# - Health checks ensure readiness before routing traffic
# - Rolling updates prevent downtime
# - Automatic backups configured
# - Monitoring & logging built-in

# DNS configuration for WSL Docker compatibility
# These are applied to all services to ensure proper DNS resolution
x-dns: &dns-config
  dns:
    - 8.8.8.8
    - 8.8.4.4
    - 1.1.1.1

x-common-variables: &common-vars
  # Prevents deployment if service fails
  restart_policy: &restart-policy
    condition: service_healthy

services:
  # PostgreSQL Database - Core persistence layer
  postgres:
    image: postgres:16-alpine
    container_name: teif-postgres
    hostname: postgres
    <<: *dns-config
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 111edfb5536c8d89fae7ae241f22eb55
      POSTGRES_DB: teif_prod
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --locale=C.UTF-8
      # Match pg_hba.conf: TCP connections use md5 (legacy but simpler)
      POSTGRES_HOST_AUTH_METHOD: md5
    volumes:
      # Main data volume - persistent across deployments
      - postgres_data:/var/lib/postgresql/data
      # Backups volume
      - postgres_backups:/backups
      # Optional: restore from backup on startup
      # - ./backups/latest.sql:/docker-entrypoint-initdb.d/init.sql
    # Port mapping for local development on Windows
    ports:
      - "5432:5432"
    # Resource limits for production
    mem_limit: 512M
    mem_reservation: 256M
    cpus: 1.0
    cpu_shares: 1024
    # Health check - must pass before dependent services start
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Restart strategy for reliability
    restart: unless-stopped
    networks:
      - teif-network
    # Security: no privilege escalation
    security_opt:
      - no-new-privileges:true
    # Performance tuning for production
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "work_mem=4MB"
      - "-c"
      - "wal_buffers=16MB"
    labels:
      # For monitoring/management tools
      service: "database"
      environment: "production"

  # Backend API Server - Hono.js + Prisma
  backend:
    image: maksebdev3/teif-backend:latest
    container_name: teif-backend
    hostname: backend
    <<: *dns-config
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Core configuration
      NODE_ENV: production
      PORT: 3000
      
      # Database - hardcoded for now since compose env variable substitution issue
      DATABASE_URL: postgresql://postgres:111edfb5536c8d89fae7ae241f22eb55@postgres:5432/teif_prod?schema=public
      
      # Security & Authentication
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      JWT_EXPIRY: ${JWT_EXPIRY:-3600}
      
      # Application URLs
      FRONTEND_URL: ${FRONTEND_URL}
      SITE_URL: ${SITE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
      
      # Signature & Security
      SIGNATURE_ENCRYPTION_KEY: ${SIGNATURE_ENCRYPTION_KEY}
      SIGNATURE_REQUIRE_HTTPS: ${SIGNATURE_REQUIRE_HTTPS:-true}
      
      # Email Configuration
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      # backwards-compatible alias for older code
      SMTP_PASS: ${SMTP_PASSWORD}
      
      # Optional AI Features
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      
      # Logging (for monitoring)
      LOG_LEVEL: ${LOG_LEVEL:-info}
    
    # Expose port for local testing / development
    ports:
      - "3000:3000"
    
    # Network attachment
    networks:
      - teif-network
    
    # Health check - use node-based check since wget not available
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get({hostname:'localhost',port:3000,path:'/api/health'}, (r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Restart strategy - keeps service running
    restart: unless-stopped
    
    # Security hardening
    security_opt:
      - no-new-privileges:true
    
    # Resource management - prevents resource exhaustion (compose format)
    mem_limit: 512M
    mem_reservation: 256M
    cpus: 1.0
    cpu_shares: 1024
    
    # Restart policy for resilience (requires deploy section in docker-compose v3.8)
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    
    labels:
      service: "api"
      environment: "production"
      monitoring: "enabled"

  # Frontend Web Server - React + Nginx
  frontend:
    image: maksebdev3/teif-frontend:latest
    container_name: teif-frontend
    hostname: frontend
    <<: *dns-config
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # API configuration - points to backend service
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://backend:3000/api}
      
      # Optional AI Features
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    
    # Expose port for local testing / development
    ports:
      - "80:80"
    
    # Network attachment
    networks:
      - teif-network
    
    # Health check - simple sleep to allow service startup time
    healthcheck:
      test: ["CMD-SHELL", "sleep 1 && exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Restart strategy
    restart: unless-stopped
    
    # Security hardening
    security_opt:
      - no-new-privileges:true
    
    # Resource management (compose format)
    mem_limit: 256M
    mem_reservation: 128M
    cpus: 0.5
    cpu_shares: 512
    
    # Restart policy for resilience (requires deploy section in docker-compose v3.8)
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 60s
    
    labels:
      service: "web"
      environment: "production"
      monitoring: "enabled"

# Persistent data volumes
volumes:
  # PostgreSQL data - survives container recreation
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/postgres
  
  # Database backups volume
  postgres_backups:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./volumes/backups

# Internal service network - isolated from host
networks:
  teif-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.25.0.0/16